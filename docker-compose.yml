version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SLUonTOP123"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
      - ./database/setup.sql:/setup.sql

  flask:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
    env_file: .env
    environment:
      - DB_SERVER=db
      - DB_PASSWORD=SLUonTOP123
    # Mount the local src/ folder into the container so code updates instantly 
    # without needing to rebuild the Docker image!
    volumes:
      - ./src:/app

  # Standalone AI microservice processing requests securely on port 5001
  ai:
    build: .
    command: python AiApi.py
    ports:
      - "5001:5001"
    env_file: .env
    # Keeping the AI container live-synced to local file changes too
    volumes:
      - ./src:/app

volumes:
  sqldata:


networks:
  default:
    driver: bridge
